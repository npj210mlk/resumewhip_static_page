<!-- Home Page stuff -->

{% extends "layout.html" %}
{% block title %}Upload Resume{% endblock %}

{% block content %}
  <h2>Upload Your Resume & Paste the Job Description</h2>
  <form action="{{ url_for('tailor_resume') }}" method="POST" enctype="multipart/form-data">
    <label for="resume_file">Resume File (.txt or .md):</label>
    <input type="file" name="resume_file" accept=".txt,.md" required><br><br>

    <label for="job_description">Paste the Job Description:</label><br>
    <textarea name="job_description" rows="12" cols="80" required></textarea><br><br>

    <button type="submit">Work Your Resume Magic!</button>
  </form>

  {% if session.resume_on_file %}
    <form action="{{ url_for('clear_resume') }}" method="GET">
      <button type="submit">Dump Resume</button>
    </form>
  {% endif %}
{% endblock %}
